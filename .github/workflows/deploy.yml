name: Sync Stats & Deploy to GitHub Pages

on:
  schedule:
    # Run daily at 7 AM UTC (midnight PT, after west coast games finish)
    - cron: '0 7 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync new MLB stats (incremental)
        run: npx tsx scripts/sync-and-build.ts

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baseball.db public/data/
          git diff --staged --quiet || git commit -m "Daily stat sync $(date -u +%Y-%m-%d)"
          git push

      - name: Prepare static build
        run: rm -rf src/app/api

      - name: Build static site
        env:
          STATIC_EXPORT: 'true'
          NEXT_PUBLIC_STATIC: 'true'
          NEXT_PUBLIC_BASE_PATH: '/baseball-tracker'
        run: npx next build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
